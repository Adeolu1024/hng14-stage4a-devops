    include /etc/nginx/mime.types;
    default_type application/json;

    log_format swift '$time_iso8601 | $status | ${request_time}s | $upstream_addr | $request';
    access_log /var/log/nginx/access.log swift;

    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    server {
        listen 8080;
        server_name localhost;

        # Docker embedded DNS resolver (127.0.0.11 is Docker's internal DNS)
        # valid=5s means cached upstream IPs expire quickly if container restarts
        resolver 127.0.0.11 valid=5s;

        add_header X-Deployed-By "swiftdeploy" always;

        location / {
            # Use variable to defer hostname resolution (allows nginx -t without container running)
            set $backend "http://api-service:5000";
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        error_page 502 @error502;
        error_page 503 @error503;
        error_page 504 @error504;

        location @error502 {
            default_type application/json;
            return 502 '{"error":"Bad Gateway","code":"502","service":"swiftdeploy","contact":"devops@swiftdeploy.local"}';
        }

        location @error503 {
            default_type application/json;
            return 503 '{"error":"Service Unavailable","code":"503","service":"swiftdeploy","contact":"devops@swiftdeploy.local"}';
        }

        location @error504 {
            default_type application/json;
            return 504 '{"error":"Gateway Timeout","code":"504","service":"swiftdeploy","contact":"devops@swiftdeploy.local"}';
        }
    }
}
